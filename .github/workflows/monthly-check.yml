name: Monthly listing check

on:
  schedule:
    # 06:00 UTC on the 1st of every month
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Re-check all listings
        run: npm run check

      - name: Open an issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "Monthly listing check failed ($(date -u +%Y-%m))" \
            --body "The scheduled verification re-check found hard failures (unreachable listing, HTTP error, or off-domain redirect).

          Failed run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID

          To review locally: \`npm run check\`
          To revoke badges on confirmed failures: \`npm run check -- --apply\`, then rebuild and commit."
